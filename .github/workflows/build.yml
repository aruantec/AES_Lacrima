name: Build

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Ensure scripts are executable
        run: chmod +x ./build.sh ./AES_Lacrima/Mac/publish-macos.sh ./AES_Lacrima/Linux/package-appimage.sh

      - name: Restore local tools
        run: dotnet tool restore

      - name: Run NUKE test target
        run: ./build.sh Test --configuration Release

  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows win-x64
            runs_on: windows-latest
            runtime: win-x64
            publish_dir_name: win-x64
            publish_aot: false
            package_type: windows
            artifact_name: AES-Lacrima-windows-win-x64
            asset_name: AES-Lacrima-windows-win-x64.zip
          - name: Windows win-x64 AOT
            runs_on: windows-latest
            runtime: win-x64
            publish_dir_name: win-x64-AOT
            publish_aot: true
            package_type: windows
            artifact_name: AES-Lacrima-windows-win-x64-AOT
            asset_name: AES-Lacrima-windows-win-x64-AOT.zip
          - name: macOS osx-arm64
            runs_on: macos-latest
            runtime: osx-arm64
            publish_dir_name: osx-arm64
            publish_aot: false
            package_type: macos
            artifact_name: AES-Lacrima-macos-osx-arm64
            asset_name: AES-Lacrima-macos-osx-arm64.zip
          - name: macOS osx-arm64 AOT
            runs_on: macos-latest
            runtime: osx-arm64
            publish_dir_name: osx-arm64-AOT
            publish_aot: true
            package_type: macos
            artifact_name: AES-Lacrima-macos-osx-arm64-AOT
            asset_name: AES-Lacrima-macos-osx-arm64-AOT.zip
          - name: Linux x86_64 AppImage
            runs_on: ubuntu-latest
            runtime: linux-x64
            publish_dir_name: linux-x64
            publish_aot: false
            package_type: appimage
            artifact_name: AES-Lacrima-x86_64
            asset_name: AES-Lacrima-Linux-x86_64.AppImage
            appimage_arch: x86_64
          - name: Linux x86_64 AppImage AOT
            runs_on: ubuntu-latest
            runtime: linux-x64
            publish_dir_name: linux-x64-AOT
            publish_aot: true
            package_type: appimage
            artifact_name: AES-Lacrima-x86_64-AOT
            asset_name: AES-Lacrima-Linux-x86_64-AOT.AppImage
            appimage_arch: x86_64
          - name: Linux aarch64 AppImage
            runs_on: ubuntu-24.04-arm
            runtime: linux-arm64
            publish_dir_name: linux-arm64
            publish_aot: false
            package_type: appimage
            artifact_name: AES-Lacrima-aarch64
            asset_name: AES-Lacrima-aarch64.AppImage
            appimage_arch: aarch64
          - name: Linux aarch64 AppImage AOT
            runs_on: ubuntu-24.04-arm
            runtime: linux-arm64
            publish_dir_name: linux-arm64-AOT
            publish_aot: true
            package_type: appimage
            artifact_name: AES-Lacrima-aarch64-AOT
            asset_name: AES-Lacrima-aarch64-AOT.AppImage
            appimage_arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        if: matrix.package_type == 'windows'
        uses: microsoft/setup-msbuild@v2

      - name: Ensure scripts are executable
        if: runner.os != 'Windows'
        run: chmod +x ./build.sh ./AES_Lacrima/Mac/publish-macos.sh ./AES_Lacrima/Linux/package-appimage.sh

      - name: Install Linux Native AOT prerequisites
        if: runner.os == 'Linux' && matrix.publish_aot
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore generator
        run: dotnet restore AES_Di.Generator/AES_Di.Generator.csproj

      - name: Build WgcBridge (Windows)
        if: matrix.package_type == 'windows'
        shell: pwsh
        run: |
          Write-Host "Building WgcBridge for Windows..."
          nuget restore WgcBridge/packages.config -PackagesDirectory packages
          msbuild WgcBridge/WgcBridge.vcxproj /p:Configuration=Release /p:Platform=x64 /p:BuildTarget=Build /p:PlatformToolset=v143
          $wgc = "AES_Lacrima/libs/windows/WgcBridge.dll"
          if (Test-Path $wgc) {
            Write-Host "Successfully built WgcBridge.dll at $wgc"
          } else {
            Write-Error "::error::WgcBridge.dll not found at $wgc after build."
            exit 1
          }

      - name: Publish app on Windows
        if: matrix.package_type == 'windows'
        shell: pwsh
        run: |
          $arguments = @(
            'publish',
            'AES_Lacrima/AES_Lacrima.csproj',
            '-c', 'Release',
            '-r', '${{ matrix.runtime }}',
            '-o', 'output/publish/Release/${{ matrix.publish_dir_name }}',
            '-p:Version=0.0.0-local',
            '-p:BuildWgcBridge=false'
          )
          if ('${{ matrix.publish_aot }}' -eq 'true') {
            $arguments += '-p:PublishAot=true'
          }
          dotnet @arguments

      - name: Copy WgcBridge.dll to publish output (Windows)
        if: matrix.package_type == 'windows'
        shell: pwsh
        run: |
          $publishedDir = "output/publish/Release/${{ matrix.publish_dir_name }}"
          $bridgeSource = "AES_Lacrima/libs/windows/WgcBridge.dll"
          if (Test-Path $bridgeSource) {
            Write-Host "Copying $bridgeSource to $publishedDir"
            Copy-Item $bridgeSource -Destination "$publishedDir/" -Force
            if (Test-Path "$publishedDir/WgcBridge.dll") {
                Write-Host "Successfully verified WgcBridge.dll in $publishedDir"
            } else {
                Write-Error "::error::Failed to copy WgcBridge.dll to $publishedDir"
                exit 1
            }
          } else {
            Write-Error "::error::WgcBridge.dll not found at $bridgeSource."
            exit 1
          }

      - name: Publish app on Unix
        if: matrix.package_type != 'windows'
        run: |
          args=(
            publish
            AES_Lacrima/AES_Lacrima.csproj
            -c Release
            -r "${{ matrix.runtime }}"
            -o "output/publish/Release/${{ matrix.publish_dir_name }}"
            -p:Version=0.0.0-local
          )
          if [[ "${{ matrix.publish_aot }}" == "true" ]]; then
            args+=(-p:PublishAot=true)
          fi
          dotnet "${args[@]}"

      - name: Package Windows archive
        if: matrix.package_type == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path output/publish/Release/${{ matrix.publish_dir_name }}/* -DestinationPath artifacts/${{ matrix.asset_name }}

      - name: Package macOS archive
        if: matrix.package_type == 'macos'
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "output/publish/Release/${{ matrix.publish_dir_name }}/AES - Lacrima.app" "artifacts/${{ matrix.asset_name }}"

      - name: Download appimagetool
        if: matrix.package_type == 'appimage'
        run: |
          mkdir -p tools artifacts
          curl -fsSL -o "tools/appimagetool.AppImage" "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage"
          chmod +x "tools/appimagetool.AppImage"

      - name: Package AppImage
        if: matrix.package_type == 'appimage'
        env:
          APPIMAGETOOL: ${{ github.workspace }}/tools/appimagetool.AppImage
          APP_VERSION: 0.0.0-local
        run: |
          ./AES_Lacrima/Linux/package-appimage.sh \
            "output/publish/Release/${{ matrix.publish_dir_name }}" \
            "artifacts" \
            "${{ matrix.appimage_arch }}" \
            "${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.asset_name }}
          if-no-files-found: error
