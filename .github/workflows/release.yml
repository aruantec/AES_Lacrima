name: Release

on:
  release:
    # Trigger when a release is created/published (including prereleases)
    types: [created, published, prereleased]
  push:
    tags:
      - 'v*'
  # Allow manual reruns from the Actions UI
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version tag to create (e.g. v1.2.3)'
        required: false
      prerelease:
        description: 'If true, create a prerelease tag (e.g. v1.2.3-rc.1)'
        required: false
        default: 'false'

permissions:
  contents: write

# Opt into Node.js 24 for JavaScript-based actions (e.g. actions/checkout, actions/setup-dotnet)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AES_Tests/AES_Tests.csproj -r linux-x64

      - name: Run tests
        run: dotnet test AES_Tests/AES_Tests.csproj -c Release -r linux-x64 --no-restore

  package:
    name: ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runs_on: windows-latest
            runtime: win-x64
            publish_dir_name: win-x64
            publish_aot: false
            package_type: windows
            artifact_name: release-AES-Lacrima-windows-x64
            asset_name: AES-Lacrima-windows-x64.zip
          - name: Windows x64 AOT
            runs_on: windows-latest
            runtime: win-x64
            publish_dir_name: win-x64-AOT
            publish_aot: true
            package_type: windows
            artifact_name: release-AES-Lacrima-windows-x64-AOT
            asset_name: AES-Lacrima-windows-x64-AOT.zip
          - name: macOS osx-arm64
            runs_on: macos-latest
            runtime: osx-arm64
            publish_dir_name: osx-arm64
            publish_aot: false
            package_type: macos
            artifact_name: release-AES-Lacrima-macos-osx-arm64
            asset_name: AES-Lacrima-macos-osx-arm64.zip
          - name: macOS osx-arm64 AOT
            runs_on: macos-latest
            runtime: osx-arm64
            publish_dir_name: osx-arm64-AOT
            publish_aot: true
            package_type: macos
            artifact_name: release-AES-Lacrima-macos-osx-arm64-AOT
            asset_name: AES-Lacrima-macos-osx-arm64-AOT.zip
          - name: macOS osx-x64
            runs_on: macos-latest
            runtime: osx-x64
            publish_dir_name: osx-x64
            publish_aot: false
            package_type: macos
            artifact_name: release-AES-Lacrima-macos-osx-x64
            asset_name: AES-Lacrima-macos-osx-Intel-x64.zip
          - name: macOS osx-x64 AOT
            runs_on: macos-latest
            runtime: osx-x64
            publish_dir_name: osx-x64-AOT
            publish_aot: true
            package_type: macos
            artifact_name: release-AES-Lacrima-macos-osx-x64-AOT
            asset_name: AES-Lacrima-macos-osx-Intel-x64-AOT.zip
          - name: Linux x86_64 AppImage
            runs_on: ubuntu-latest
            runtime: linux-x64
            publish_dir_name: linux-x64
            publish_aot: false
            package_type: appimage
            artifact_name: release-AES-Lacrima-x86_64
            asset_name: AES-Lacrima-Linux-x86_64.AppImage
            appimage_arch: x86_64
          - name: Linux x86_64 AppImage AOT
            runs_on: ubuntu-latest
            runtime: linux-x64
            publish_dir_name: linux-x64-AOT
            publish_aot: true
            package_type: appimage
            artifact_name: release-AES-Lacrima-x86_64-AOT
            asset_name: AES-Lacrima-Linux-x86_64-AOT.AppImage
            appimage_arch: x86_64
          - name: Linux aarch64 AppImage
            runs_on: ubuntu-24.04-arm
            runtime: linux-arm64
            publish_dir_name: linux-arm64
            publish_aot: false
            package_type: appimage
            artifact_name: release-AES-Lacrima-aarch64
            asset_name: AES-Lacrima-aarch64.AppImage
            appimage_arch: aarch64
          - name: Linux aarch64 AppImage AOT
            runs_on: ubuntu-24.04-arm
            runtime: linux-arm64
            publish_dir_name: linux-arm64-AOT
            publish_aot: true
            package_type: appimage
            artifact_name: release-AES-Lacrima-aarch64-AOT
            asset_name: AES-Lacrima-aarch64-AOT.AppImage
            appimage_arch: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup MSBuild
        if: matrix.package_type == 'windows'
        uses: microsoft/setup-msbuild@v2

      - name: Resolve project version
        id: version
        shell: bash
        run: |
          RAW_VERSION="${{ github.event.inputs.version || github.event.release.tag_name || github.ref_name || '0.0.0-local' }}"
          PROJECT_VERSION="${RAW_VERSION#v}"
          PROJECT_VERSION="${PROJECT_VERSION#V}"
          
          # Accept shorthand suffixes like 1.2.3b by converting to SemVer pre-release form 1.2.3-b.
          if [[ "$PROJECT_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)([A-Za-z][0-9A-Za-z.-]*)$ ]]; then
            PROJECT_VERSION="${BASH_REMATCH[1]}-${BASH_REMATCH[2]}"
          fi
          
          if [[ ! "$PROJECT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid project version after normalization: '$PROJECT_VERSION'" >&2
            exit 1
          fi

          echo "raw=$RAW_VERSION" >> "$GITHUB_OUTPUT"
          echo "project=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure scripts are executable
        if: runner.os != 'Windows'
        run: chmod +x ./build.sh ./AES_Lacrima/Mac/publish-macos.sh ./AES_Lacrima/Linux/package-appimage.sh

      - name: Install Linux Native AOT prerequisites
        if: runner.os == 'Linux' && matrix.publish_aot
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore generator
        run: dotnet restore AES_Di.Generator/AES_Di.Generator.csproj

      - name: Build WgcBridge (Windows)
        if: matrix.package_type == 'windows'
        run: |
          echo "Building WgcBridge for Windows..."
          
          # Restore NuGet packages for the C++ project
          nuget restore WgcBridge/packages.config -PackagesDirectory packages
          
          # Build the C++ project using MSBuild
          # This should output to AES_Lacrima/libs/windows/WgcBridge.dll as defined in the .vcxproj
          msbuild WgcBridge/WgcBridge.vcxproj /p:Configuration=Release /p:Platform=x64 /p:BuildTarget=Build
          
          # Verify the build output
          if [ -f "AES_Lacrima/libs/windows/WgcBridge.dll" ]; then
            echo "Successfully built WgcBridge.dll at AES_Lacrima/libs/windows/WgcBridge.dll"
          else
            echo "::error::WgcBridge.dll not found at AES_Lacrima/libs/windows/WgcBridge.dll after build."
            exit 1
          fi

      - name: Publish app on Windows
        if: matrix.package_type == 'windows'
        shell: pwsh
        run: |
          $arguments = @(
            'publish',
            'AES_Lacrima/AES_Lacrima.csproj',
            '-c', 'Release',
            '-r', '${{ matrix.runtime }}',
            '-o', 'output/publish/Release/${{ matrix.publish_dir_name }}',
            '-p:Version=${{ steps.version.outputs.project }}',
            '-p:BuildWgcBridge=false'
          )
          if ('${{ matrix.publish_aot }}' -eq 'true') {
            $arguments += '-p:PublishAot=true'
          }
          dotnet @arguments

      - name: Copy WgcBridge.dll to publish output (Windows)
        if: matrix.package_type == 'windows'
        run: |
          PUBLISHED_DIR="output/publish/Release/${{ matrix.publish_dir_name }}"
          BRIDGE_SOURCE="AES_Lacrima/libs/windows/WgcBridge.dll"

          if [ -f "$BRIDGE_SOURCE" ]; then
            echo "Copying $BRIDGE_SOURCE to $PUBLISHED_DIR"
            cp "$BRIDGE_SOURCE" "$PUBLISHED_DIR/"
            if [ -f "$PUBLISHED_DIR/WgcBridge.dll" ]; then
                echo "Successfully verified WgcBridge.dll in $PUBLISHED_DIR"
            else
                echo "::error::Failed to copy WgcBridge.dll to $PUBLISHED_DIR"
                exit 1
            fi
          else
            echo "::error::WgcBridge.dll not found at $BRIDGE_SOURCE. Skip copy."
            exit 1
          fi

          if (-Not $bridgePath) {
            # also check the AES_Lacrima build output folder as seen on local systems
            $buildOutputCandidates = @(
              "AES_Lacrima/bin/Release/net10.0/${{ matrix.runtime }}/WgcBridge.dll",
              "AES_Lacrima/bin/Release/net10.0/win-x64/WgcBridge.dll"
            )
            foreach ($candidate in $buildOutputCandidates) {
              if (Test-Path $candidate) {
                $bridgePath = $candidate
                Write-Host "Found WgcBridge.dll in AES_Lacrima build output at $bridgePath"
                break
              }
            }
          }

          if (-Not $bridgePath) {
            # if published app has WgcBridge in a child folder, find it
            $found = Get-ChildItem -Path $publishedDir -Filter 'WgcBridge.dll' -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) {
              $bridgePath = $found.FullName
              Write-Host "Found WgcBridge.dll in published output at $bridgePath"
            }
          }

          if (-Not $bridgePath) {
            Write-Error "WgcBridge.dll not found in expected source locations or publish output"
            exit 1
          }

          $dest = Join-Path $publishedDir 'WgcBridge.dll'
          # Use Move-Item or Copy-Item -Force to ensure it's in the root
          Copy-Item -Path $bridgePath -Destination $dest -Force
          Write-Host "Copied WgcBridge.dll to publish output: $dest"

          if (-Not (Test-Path $dest)) {
            Write-Error "Failed to copy WgcBridge.dll into publish output"
            exit 1
          }

      - name: Publish app on Unix
        if: matrix.package_type != 'windows'
        run: |
          args=(
            publish
            AES_Lacrima/AES_Lacrima.csproj
            -c Release
            -r "${{ matrix.runtime }}"
            -o "output/publish/Release/${{ matrix.publish_dir_name }}"
            -p:Version=${{ steps.version.outputs.project }}
          )
          if [[ "${{ matrix.publish_aot }}" == "true" ]]; then
            args+=(-p:PublishAot=true)
          fi
          dotnet "${args[@]}"

      - name: Package Windows archive
        if: matrix.package_type == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path output/publish/Release/${{ matrix.publish_dir_name }}/* -DestinationPath artifacts/${{ matrix.asset_name }}

      - name: Package macOS archive
        if: matrix.package_type == 'macos'
        run: |
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent "output/publish/Release/${{ matrix.publish_dir_name }}/AES - Lacrima.app" "artifacts/${{ matrix.asset_name }}"

      - name: Download appimagetool
        if: matrix.package_type == 'appimage'
        run: |
          mkdir -p tools artifacts
          curl -fsSL -o "tools/appimagetool.AppImage" "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${{ matrix.appimage_arch }}.AppImage"
          chmod +x "tools/appimagetool.AppImage"

      - name: Package AppImage
        if: matrix.package_type == 'appimage'
        env:
          APPIMAGETOOL: ${{ github.workspace }}/tools/appimagetool.AppImage
          APP_VERSION: ${{ steps.version.outputs.project }}
        run: |
          ./AES_Lacrima/Linux/package-appimage.sh \
            "output/publish/Release/${{ matrix.publish_dir_name }}" \
            "artifacts" \
            "${{ matrix.appimage_arch }}" \
            "${{ matrix.asset_name }}"

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.asset_name }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded assets for debug
        run: |
          echo "--- release-assets tree ---"
          find release-assets -type f -maxdepth 3 -print

      - name: Create GitHub release + upload assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          INPUT_PRERELEASE: ${{ github.event.inputs.prerelease || 'false' }}
        run: |
          set -euo pipefail

          # Find all built release artifacts (zip/AppImage) under the downloaded artifact folder.
          mapfile -t files < <(find release-assets -type f \( -iname '*.zip' -o -iname '*.AppImage' \) -print)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found in release-assets/"
            ls -la release-assets || true
            exit 1
          fi

          echo "Found ${#files[@]} release assets to upload:"
          for f in "${files[@]}"; do
            echo "  - $f"
          done

          # Determine release tag/name
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            RELEASE_TAG="$(jq -r '.release.tag_name' < "${GITHUB_EVENT_PATH}")"
          else
            # workflow_dispatch or other events
            if [[ -n "${INPUT_VERSION:-}" ]]; then
              RELEASE_TAG="${INPUT_VERSION}"
            else
              # Determine the next patch version from the most recent stable tag
              # (stable tags are strict semver without prerelease suffixes like -alpha/rc)
              stable_latest=$(git tag --list 'v*' \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | sort -Vr \
                | head -n1 || true)
              if [[ -z "${stable_latest}" ]]; then
                stable_latest='v0.0.0'
              fi

              base="${stable_latest#v}"
              IFS='.' read -r major minor patch <<< "${base}"
              next_patch=$((patch + 1))
              next_base="${major}.${minor}.${next_patch}"

              if [[ "${INPUT_PRERELEASE:-false}" == "true" ]]; then
                max_rc=0
                for tag in $(git tag --list "v${next_base}-rc.*"); do
                  rc="${tag##*-rc.}"
                  if [[ "${rc}" =~ ^[0-9]+$ ]] && (( rc > max_rc )); then
                    max_rc=$rc
                  fi
                done
                RELEASE_TAG="v${next_base}-rc.$((max_rc + 1))"
              else
                RELEASE_TAG="v${next_base}"
              fi
            fi
          fi

          echo "Using release tag: ${RELEASE_TAG}"

          # Ensure the GitHub Release exists (create if missing)
          if ! gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            prerelease_flag=""
            if [[ "${RELEASE_TAG}" == *-* ]]; then
              prerelease_flag="--prerelease"
            fi
            gh release create "${RELEASE_TAG}" --title "${RELEASE_TAG}" --generate-notes ${prerelease_flag}
          fi

          # Upload all artifacts (overwrite existing if present)
          for f in "${files[@]}"; do
            echo "Uploading $f"
            gh release upload "${RELEASE_TAG}" "$f" --clobber
          done
